<section class="travel-menu-bar">
  <form class="travel-search-form" action="">
    <div class="travel-search-intro">
      <span class="travel-search-ttl">Plan Your Journey</span>
      <h2>Find your next holiday in minutes</h2>
    </div>

    <div class="travel-search-fields">
      <div class="travel-field">
        <label for="destination">WHERE TO?</label>
        <input id="destination" type="text" placeholder="Paris, Tokyo, Bali..." />
      </div>

      <div class="travel-field">
        <label for="travel-type">TRAVEL TYPE</label>
        <select id="travel-type">
          <option value="">Choose a trip</option>
        </select>
      </div>

      <div class="travel-field">
        <label for="leaving">LEAVING</label>
        <input id="leaving" type="date" />
      </div>

      <div class="travel-field">
        <label for="returning">RETURNING</label>
        <input id="returning" type="date" />
      </div>

      <button type="submit" class="login-btn travel-search-btn">Search Trips</button>
    </div>
  </form>
</section>
